services:

  presentation-service:
    build: ./presentation-service
    container_name: presentation-service
    ports:
      - "8080:8080"
    depends_on:
      - workflow-service
    restart: always

  workflow-service:
    build: ./workflow-service
    container_name: workflow-service
    ports:
      - "5001:5001"
    depends_on:
      - data-service
    restart: always

  data-service:
    build: ./data-service
    container_name: data-service
    ports:
      - "5000:5000"
    env_file:
      - ./data-service/.env
    restart: always